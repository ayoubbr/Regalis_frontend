<div class="quiz-overlay" *ngIf="quiz">
   <div class="quiz-container">

      <!-- Duolingo-style Header -->
      <header class="quiz-header">
         <button class="close-btn" (click)="close()">
            <span class="material-symbols-outlined">close</span>
         </button>
         
         <div class="progress-bar-container">
            <div class="progress-bar-fill" [style.width.%]="progressPercentage"></div>
         </div>

         <div class="stats-group" *ngIf="questions.length > 0">
            <span class="material-symbols-outlined" style="color: #ffc800;">bolt</span>
            <span>{{ currentQuestion.xpReward || 0 }}</span>
         </div>
      </header>

      <!-- Error State -->
      <div class="error-state" *ngIf="hasError">
         <span class="material-symbols-outlined error-icon">error</span>
         <h2>Couldn't load questions</h2>
         <p>This quiz has no questions yet. Please try again later.</p>
         <button class="chunky-button primary-btn" (click)="close()">GO BACK</button>
      </div>

      <!-- Main Content Area -->
      <div class="quiz-content" *ngIf="questions.length > 0 && !hasError">

         <!-- Instruction: Character + Speech Bubble -->
         <section class="instruction-section">
            <div class="character-avatar">
               <img src="assets/images/characters/regalis-avatar.png" alt="Commander">
            </div>
            <div class="speech-bubble">
               <p class="instruction-text">"{{ currentQuestion.hint || 'Think carefully, traveler!' }}"</p>
            </div>
         </section>

         <!-- Question Text -->
         <h2 class="question-text">{{ currentQuestion.text }}</h2>

         <!-- Options Grid -->
         <div class="options-grid">
            <button *ngFor="let option of currentQuestion.options" class="option-card"
               [ngClass]="getOptionClass(option)" (click)="selectOption(option.id)">
               <div class="option-label" [ngClass]="getOptionClass(option)">{{ option.label }}</div>
               <span class="option-text">{{ option.text }}</span>
               <div class="status-icon" *ngIf="isAnswerChecked && option.id === currentQuestion.correctOptionId">
                  <span class="material-symbols-outlined">check_circle</span>
               </div>
               <div class="status-icon"
                  *ngIf="isAnswerChecked && option.id === selectedOptionId && option.id !== currentQuestion.correctOptionId">
                  <span class="material-symbols-outlined">cancel</span>
               </div>
            </button>
         </div>
      </div>

      <!-- Footer Action Area -->
      <footer class="action-area" *ngIf="questions.length > 0 && !hasError">
         <div class="action-container">
            <div class="footer-left">
               <button class="text-btn" (click)="previousQuestion()" [disabled]="currentQuestionIndex === 0">
                  <span class="material-symbols-outlined">arrow_back</span> BACK
               </button>
            </div>

            <div class="feedback-msg" *ngIf="isAnswerChecked"
               [ngClass]="results[currentQuestionIndex]?.isCorrect ? 'correct-text' : 'incorrect-text'">
               {{ results[currentQuestionIndex]?.isCorrect ? 'Correct!' : 'Incorrect!' }}
            </div>

            <button *ngIf="!isAnswerChecked" class="chunky-button check-btn" (click)="checkAnswer()"
               [disabled]="!selectedOptionId">
               CHECK
            </button>

            <button *ngIf="isAnswerChecked" class="chunky-button"
               [ngClass]="results[currentQuestionIndex]?.isCorrect ? 'success-btn' : 'primary-btn'"
               (click)="nextQuestion()">
               {{ currentQuestionIndex === questions.length - 1 ? 'FINISH' : 'CONTINUE' }}
            </button>
         </div>
      </footer>

   </div>
</div>
